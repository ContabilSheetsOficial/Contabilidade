<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Gerador DAS MEI</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      text-align: center;
      padding: 50px;
    }
    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }
    button {
      background: green;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Emitir DAS MEI</h2>

  <input type="text" id="cnpj" placeholder="Digite o CNPJ">

  <select id="ano">
    <option value="">Selecione o Ano</option>
    <option>2023</option>
    <option>2024</option>
    <option>2025</option>
    <option>2026</option>
  </select>

  <select id="mes">
    <option value="">Selecione o Mês</option>
    <option value="01">Janeiro</option>
    <option value="02">Fevereiro</option>
    <option value="03">Março</option>
    <option value="04">Abril</option>
    <option value="05">Maio</option>
    <option value="06">Junho</option>
    <option value="07">Julho</option>
    <option value="08">Agosto</option>
    <option value="09">Setembro</option>
    <option value="10">Outubro</option>
    <option value="11">Novembro</option>
    <option value="12">Dezembro</option>
  </select>

  <button onclick="gerarDAS()">Gerar DAS</button>
</div>

<script>
function gerarDAS() {
  const cnpj = document.getElementById("cnpj").value;
  const ano = document.getElementById("ano").value;
  const mes = document.getElementById("mes").value;

  if (!cnpj || !ano || !mes) {
    alert("Preencha todos os campos");
    return;
  }

  // Abre o sistema oficial
  const url = "https://www8.receita.fazenda.gov.br/SimplesNacional/Aplicacoes/ATSPO/pgmei.app/Identificacao";

  window.open(url, "_blank");

  alert("Você será direcionado para o sistema oficial.\nPreencha o CNPJ e selecione o período.");
}
</script>

</body>
</html>
