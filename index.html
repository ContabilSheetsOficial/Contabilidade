<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(-45deg, #0f2027, #203a43, #0a0f1c, #1a2f3a);
      background-size: 400% 400%;
      animation: gradientMove 10s ease infinite;
      color: #fff;
      padding: 30px 15px 40px;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      width: 100%;
      max-width: 380px;
      margin: 0 auto;
      text-align: center;
      padding: 20px;
    }

    .profile-img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid rgba(0,255,136,0.6);
      object-fit: cover;
      margin: 20px auto 15px;
      box-shadow: 0 0 25px rgba(0,255,136,0.6);
    }

    h1 {
      font-size: 26px;
      font-weight: 600;
    }

    h2 {
      font-size: 16px;
      font-weight: 300;
      color: #ccc;
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      margin-bottom: 25px;
      color: #aaa;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: linear-gradient(135deg, #25D366, #1ebe5d);
      color: #fff;
      text-decoration: none;
      padding: 14px;
      margin: 10px 0;
      border-radius: 12px;
      font-weight: 600;
      text-transform: uppercase;
      position: relative;
    }

    .btn i {
      position: absolute;
      left: 16px;
    }

    .video-box {
      margin-top: 20px;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
      aspect-ratio: 9 / 16;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .video-box iframe {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border: none;
    }

    .sound-btn {
      margin-top: 10px;
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: #fff;
      cursor: pointer;
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>

<body>
  <div class="container">

    <img src="https://yt3.googleusercontent.com/ioNCpb6Bnv0ONnFAwPRjMiyZzqP0988Lx3Wxexnx9VDFrP9rlWF5FMSO6g21qobGqqplpWI-xw=s900-c-k-c0x00ffffff-no-rj" class="profile-img">

    <h1>CONTÁBIL SHEETS</h1>

    <a href="#" class="btn"><i class="fas fa-briefcase"></i> CONTABILIDADE EMPRESARIAL</a>
    <a href="https://wa.me/5582999284225" class="btn"><i class="fab fa-whatsapp"></i> MEU WHATSAPP</a>
    <a href="https://www.instagram.com/contabilsheets" class="btn"><i class="fab fa-instagram"></i> MEU INSTAGRAM</a>
    <a href="https://www.linkedin.com/in/ewerton-renato-67032753/" class="btn"><i class="fab fa-linkedin"></i> MEU LINKDIN</a>

    <div class="video-box">
      <div id="player"></div>
    </div>

    <button class="sound-btn" onclick="ativarSom()">🔊 ATIVAR SOM</button>

    <div class="footer">© 2026 - Ewerton Renato</div>

  </div>

  <!-- API YOUTUBE -->
  <script src="https://www.youtube.com/iframe_api"></script>

  <script>
    let player;

    function onYouTubeIframeAPIReady() {
      player = new YT.Player('player', {
        playerVars: {
          listType: 'playlist',
          list: 'PLQkSthvg_zWsyjumuzr4V7MYkDDQaYqMR',
          autoplay: 1,
          mute: 1,
          controls: 0,
          loop: 1,
          rel: 0
        },
        events: {
          onReady: function(event) {
            event.target.playVideo();

            // Tenta forçar 1080p
            event.target.setPlaybackQuality('hd1080');
            event.target.setPlaybackQualityRange('hd1080');

            // Velocidade
            event.target.setPlaybackRate(0.9);
          },
          onPlaybackQualityChange: function(event) {
            if (event.data !== 'hd1080') {
              player.setPlaybackQuality('hd1080');
            }
          }
        }
      });
    }

    function ativarSom() {
      player.unMute();
      player.setPlaybackRate(0.9);
      player.setPlaybackQuality('hd1080');
    }
  </script>

</body>
</html>
