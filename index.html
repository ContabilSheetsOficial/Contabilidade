      color: #fff;
      text-decoration: none;
      padding: 14px;
      margin: 10px 0;
      border-radius: 12px;
      font-weight: 600;
      text-transform: uppercase;
      position: relative;
      transition: 0.3s;
    }

    .btn i {
      position: absolute;
      left: 16px;
    }

    .btn:hover {
      transform: scale(1.03);
      box-shadow: 0 0 15px rgba(0,255,136,0.5);
    }

    .video-box {
      margin-top: 20px;
