<script src="https://www.youtube.com/iframe_api"></script>

<script>
let player;
let somAtivo=false;

function onYouTubeIframeAPIReady(){
player=new YT.Player('player',{
playerVars:{
listType:'playlist',
list:'PLQkSthvg_zWsyjumuzr4V7MYkDDQaYqMR',
autoplay:1,
mute:1,
controls:0,
loop:1,
playlist:'PLQkSthvg_zWsyjumuzr4V7MYkDDQaYqMR'
},
events:{onReady:e=>e.target.playVideo()}
});
}

function ativarSom(){
if(!player)return;
if(somAtivo){
player.mute();
somAtivo=false;
document.querySelector('.sound-btn').innerText='🔊 ATIVAR SOM';
}else{
player.unMute();
somAtivo=true;
document.querySelector('.sound-btn').innerText='🔇 DESATIVAR SOM';
}
}

/* 🔥 VIBRAÇÃO */
document.querySelectorAll('.btn').forEach(btn=>{
btn.addEventListener('click',()=>{
if(navigator.vibrate){
navigator.vibrate([30,50,30]);
}
});
});
</script>
