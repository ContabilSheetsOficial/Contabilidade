<script>
let player;
let somAtivo=false;

function onYouTubeIframeAPIReady(){
player=new YT.Player('player',{
playerVars:{
listType:'playlist',
list:'PLQkSthvg_zWsyjumuzr4V7MYkDDQaYqMR',
autoplay:1,
mute:1,
controls:0,
loop:1,
playlist:'PLQkSthvg_zWsyjumuzr4V7MYkDDQaYqMR'
},
events:{onReady:e=>e.target.playVideo()}
});
}

function ativarSom(){
if(!player)return;
if(somAtivo){
player.mute();
somAtivo=false;
document.querySelector('.sound-btn').innerText='🔊 ATIVAR SOM';
}else{
player.unMute();
somAtivo=true;
document.querySelector('.sound-btn').innerText='🔇 DESATIVAR SOM';
}
}

function toggleDropdown(){
document.querySelector('.dropdown').classList.toggle('active');
}

document.querySelectorAll('.btn').forEach(btn=>{
btn.addEventListener('click',()=>{
if(navigator.vibrate){
navigator.vibrate([30,50,30]);
}
});
});

function copiarPix(event){
  event.preventDefault();
  const pix = "08471378485";
  navigator.clipboard.writeText(pix)
    .then(()=>{ alert("PIX copiado: " + pix); })
    .catch(()=>{ alert("Erro ao copiar o PIX"); });
}
</script>
