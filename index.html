.dropdown-content{

.dropdown.active .dropdown-content{

.sub-btn{
display:flex;
align-items:center;
justify-content:center;
padding:12px;
border-radius:10px;
text-decoration:none;
color:#fff;
font-weight:600;
position:relative;
overflow:hidden;
}

.sub-btn i{position:absolute;left:15px;}

.cnpj-btn{background:linear-gradient(135deg,#00c853,#009624);}
.pf-btn{background:linear-gradient(135deg,#2196f3,#0d47a1);}

.btn, .sub-btn{
backdrop-filter: blur(10px);
border: 1px solid rgba(255,255,255,0.15);
box-shadow: 
  0 6px 20px rgba(0,0,0,0.35),
  inset 0 1px 0 rgba(255,255,255,0.2);
}

.btn::before, .sub-btn::before{
content:"";

top:0;
left:-75%;
width:50%;
height:100%;
background:linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
transform:skewX(-25deg);
transition:0.5s;
}

.btn:hover::before, .sub-btn:hover::before{

}

.video-box{
margin:20px auto;
border-radius:16px;
overflow:hidden;
width:100%;
max-width:320px;
aspect-ratio:9/16;
box-shadow:0 0 25px rgba(0,200,255,0.4);

#player{position:absolute;top:0;left:0;width:100%;height:100%;}

.sound-btn{

<script>
function toggleDropdown(){document.querySelectorAll('.dropdown')[1].classList.toggle('active');}
function toggleDropdownRedes(){document.querySelectorAll('.dropdown')[0].classList.toggle('active');}

let player;
let somAtivo=false;

function onYouTubeIframeAPIReady(){
player=new YT.Player('player',{
height:'100%',
width:'100%',
videoId:'dQw4w9WgXcQ',
playerVars:{
listType:'playlist',
list:'PLQkSthvg_zWsyjumuzr4V7MYkDDQaYqMR',
autoplay:1,
mute:1,
controls:0,
loop:1,
playlist:'PLQkSthvg_zWsyjumuzr4V7MYkDDQaYqMR'
},
events:{onReady:e=>e.target.playVideo()}
});
}

function ativarSom(){
if(!player)return;
if(somAtivo){
player.mute();
somAtivo=false;
document.querySelector('.sound-btn').innerText='🔊 ATIVAR SOM';
}else{
player.unMute();
somAtivo=true;
document.querySelector('.sound-btn').innerText='🔇 DESATIVAR SOM';
}
}
