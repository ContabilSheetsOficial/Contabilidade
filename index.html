  <style>

    body {

      box-shadow: 0 0 25px rgba(0,255,136,0.6);
    }

    h1 {
      font-size: 26px;
      font-weight: 600;
    }

    h2 {
      font-size: 16px;
      font-weight: 300;
      color: #ccc;
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      margin-bottom: 25px;
      color: #ddd;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: linear-gradient(135deg, #25D366, #1ebe5d);
      color: #fff;
      text-decoration: none;
      padding: 14px;
      margin: 10px 0;
      border-radius: 12px;
      font-weight: 600;
      text-transform: uppercase;
      position: relative;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(37,211,102,0.6);
    }

    .btn i {
      position: absolute;
      left: 16px;
    }

    .video-box {
      margin-top: 20px;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
      aspect-ratio: 9 / 16;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .video-box iframe {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border: none;
    }

    .sound-btn {
      margin-top: 10px;
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: #fff;
      cursor: pointer;
      transition: 0.3s;
    }

    .sound-btn:hover {
      background: rgba(255,255,255,0.2);
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #ccc;

  <script src="https://www.youtube.com/iframe_api"></script>

  <script>
    let player;

    function onYouTubeIframeAPIReady() {
      player = new YT.Player('player', {
        playerVars: {
          listType: 'playlist',
          list: 'PLQkSthvg_zWsyjumuzr4V7MYkDDQaYqMR',
          autoplay: 1,
          mute: 1,
          controls: 0,
          loop: 1,
          rel: 0
        },
        events: {
          onReady: function(event) {
            event.target.playVideo();
            event.target.setPlaybackQuality('hd1080');
            event.target.setPlaybackRate(0.9);
          },
          onPlaybackQualityChange: function(event) {
            if (event.data !== 'hd1080') {
              player.setPlaybackQuality('hd1080');
            }
          }
        }
      });
    }

    function ativarSom() {
      player.unMute();
      player.setPlaybackRate(0.9);
      player.setPlaybackQuality('hd1080');
    }
  </script>
