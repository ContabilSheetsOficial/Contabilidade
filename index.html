<script>
let player;

function onYouTubeIframeAPIReady() {
  player = new YT.Player('player', {
    playerVars: {
      listType: 'playlist',
      list: 'PLQkSthvg_zWsyjumuzr4V7MYkDDQaYqMR',
      autoplay: 1,
      mute: 1,
      controls: 0,
      loop: 1,
      playlist: 'PLQkSthvg_zWsyjumuzr4V7MYkDDQaYqMR'
    },
    events: {
      onReady: function(e) {
        e.target.playVideo();
      }
    }
  });
}

// 🔊 TOGGLE DE SOM
function ativarSom() {
  const btn = document.getElementById("btnSom");

  if (player) {
    if (player.isMuted()) {
      player.unMute();
      btn.innerHTML = "🔇 DESATIVAR SOM";
    } else {
      player.mute();
      btn.innerHTML = "🔊 ATIVAR SOM";
    }
  }
}
