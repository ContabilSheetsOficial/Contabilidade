<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Emitir DAS MEI</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: #ffffff;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
      color: #333;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      background: #2e7d32;
      color: white;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }

    button:disabled {
      background: #9e9e9e;
    }

    .info {
      margin-top: 15px;
      font-size: 12px;
      color: #666;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      text-align: left;
    }

    .modal button {
      margin-top: 15px;
      width: 100%;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Emitir DAS MEI</h2>

  <input type="text" id="cnpj" placeholder="Digite o CNPJ" maxlength="18">

  <select id="ano">
    <option value="">Ano</option>
    <option>2023</option>
    <option>2024</option>
    <option>2025</option>
    <option>2026</option>
  </select>

  <select id="mes">
    <option value="">Mês</option>
    <option value="01">Janeiro</option>
    <option value="02">Fevereiro</option>
    <option value="03">Março</option>
    <option value="04">Abril</option>
    <option value="05">Maio</option>
    <option value="06">Junho</option>
    <option value="07">Julho</option>
    <option value="08">Agosto</option>
    <option value="09">Setembro</option>
    <option value="10">Outubro</option>
    <option value="11">Novembro</option>
    <option value="12">Dezembro</option>
  </select>

  <button id="btn" onclick="gerarDAS()">Gerar DAS</button>

  <div class="info">
    Sistema otimizado para acesso ao PGMEI
  </div>
</div>

<!-- Modal de instrução -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Próximo passo</h3>
    <p><b>1.</b> Informe o CNPJ</p>
    <p><b>2.</b> Clique em <b>Continuar</b></p>
    <p><b>3.</b> Vá em <b>Emitir DAS</b></p>
    <p><b>4.</b> Selecione o período</p>

    <button onclick="irParaPGMEI()">Abrir sistema</button>
  </div>
</div>

<script>
  const inputCNPJ = document.getElementById("cnpj");

  // Máscara CNPJ
  inputCNPJ.addEventListener("input", function(e) {
    let value = e.target.value.replace(/\D/g, "");

    value = value.replace(/^(\d{2})(\d)/, "$1.$2");
    value = value.replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3");
    value = value.replace(/\.(\d{3})(\d)/, ".$1/$2");
    value = value.replace(/(\d{4})(\d)/, "$1-$2");

    e.target.value = value;
  });

  // Carregar dados salvos
  window.onload = function() {
    const cnpj = localStorage.getItem("cnpj_mei");
    const ano = localStorage.getItem("ano_mei");
    const mes = localStorage.getItem("mes_mei");

    if (cnpj) inputCNPJ.value = formatarCNPJ(cnpj);
    if (ano) document.getElementById("ano").value = ano;
    if (mes) document.getElementById("mes").value = mes;
  };

  function formatarCNPJ(cnpj) {
    return cnpj
      .replace(/^(\d{2})(\d)/, "$1.$2")
      .replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3")
      .replace(/\.(\d{3})(\d)/, ".$1/$2")
      .replace(/(\d{4})(\d)/, "$1-$2");
  }

  function gerarDAS() {
    const cnpj = inputCNPJ.value.replace(/\D/g, "");
    const ano = document.getElementById("ano").value;
    const mes = document.getElementById("mes").value;

    if (cnpj.length !== 14) {
      alert("Digite um CNPJ válido");
      return;
    }

    if (!ano || !mes) {
      alert("Selecione ano e mês");
      return;
    }

    // Salvar dados
    localStorage.setItem("cnpj_mei", cnpj);
    localStorage.setItem("ano_mei", ano);
    localStorage.setItem("mes_mei", mes);

    // Mostrar instrução
    document.getElementById("modal").style.display = "flex";
  }

  function irParaPGMEI() {
    window.location.href = "https://www8.receita.fazenda.gov.br/SimplesNacional/Aplicacoes/ATSPO/pgmei.app/Identificacao";
  }
</script>

</body>
</html>
