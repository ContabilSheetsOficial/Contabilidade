<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CONTÁBIL SHEETS | Ewerton Renato</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(-45deg, #0f2027, #203a43, #0a0f1c, #1a2f3a);
      background-size: 400% 400%;
      animation: gradientMove 8s ease infinite;
      color: #fff;
      padding: 30px 15px 40px;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      max-width: 380px;
      margin: auto;
      text-align: center;
    }

    .profile-img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid rgba(0,200,255,0.6);
      object-fit: cover;
      margin: 20px auto;
      box-shadow: 0 0 25px rgba(0,200,255,0.6);
    }

    h1 { font-size: 26px; }
    h2 { font-size: 16px; color: #ccc; }
    p { font-size: 14px; color: #aaa; margin-bottom: 20px; }

    .btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      margin: 10px 0;
      border-radius: 12px;
      font-weight: 600;
      text-transform: uppercase;
      color: #fff;
      text-decoration: none;
      overflow: hidden;
      transition: 0.3s;
    }

    .btn i {
      position: absolute;
      left: 16px;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .btn::before {
      content: "";
      position: absolute;
      top: 0;
      left: -75%;
      width: 50%;
      height: 100%;
      background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.6),
        transparent
      );
      transform: skewX(-25deg);
      animation: brilho 3s infinite;
    }

    @keyframes brilho {
      0% { left: -75%; }
      100% { left: 130%; }
    }

    .servico {
      background: linear-gradient(135deg, #4facfe, #00c6ff);
    }

    .whatsapp { background: #25D366; }

    .instagram {
      background: linear-gradient(45deg,#feda75,#fa7e1e,#d62976,#962fbf,#4f5bd5);
    }

    .linkedin { background: #0A66C2; }
    .youtube { background: #FF0000; }

    /* ✅ CPF */
    .cpf {
      background: linear-gradient(135deg, #f7c948, #d4a017);
      color: #000;
      box-shadow: 0 0 12px rgba(212, 160, 23, 0.5);
    }

    .cpf:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(212, 160, 23, 0.8);
    }

    /* ✅ CNPJ */
    .cnpj {
      background: linear-gradient(135deg, #005bea, #00c6fb);
      color: #fff;
      box-shadow: 0 0 12px rgba(0, 91, 234, 0.5);
    }

    .cnpj:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(0, 91, 234, 0.8);
    }

    /* VIDEO */
    .video-box {
      margin: 20px auto;
      border-radius: 16px;
      overflow: hidden;
      width: 100%;
      max-width: 320px;
      aspect-ratio: 9 / 16;
      position: relative;
      box-shadow: 0 0 25px rgba(0,200,255,0.4);
    }

    #player {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    .sound-btn {
      margin-top: 10px;
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: #fff;
      cursor: pointer;
      transition: 0.3s;
    }

    .sound-btn:hover {
      background: rgba(255,255,255,0.2);
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>

<body>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let player;

function onYouTubeIframeAPIReady() {
  player = new YT.Player('player', {
    playerVars: {
      listType: 'playlist',
      list: 'PLQkSthvg_zWsyjumuzr4V7MYkDDQaYqMR',
      autoplay: 1,
      mute: 1,
      controls: 0,
      loop: 1,
      playlist: 'PLQkSthvg_zWsyjumuzr4V7MYkDDQaYqMR'
    },
    events: {
      onReady: function(e) {
        e.target.playVideo();
      }
    }
  });
}

function ativarSom() {
  if (player) {
    player.unMute();
  }
}
